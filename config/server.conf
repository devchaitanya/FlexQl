# FlexQL Server Configuration
# ─────────────────────────────────────────────────────────────────────────────

# TCP port the server listens on
port = 9000

# Number of worker threads (0 = auto-detect from hardware_concurrency)
threads = 0

# ── Persistence ───────────────────────────────────────────────────────────────

# Write-Ahead Log (WAL) file path
# All mutation SQL (INSERT/UPDATE/DELETE/CREATE/DROP/TRUNCATE) is appended here
# before execution, guaranteeing durability on crash.
wal_path = data/wal/wal.log

# Snapshot directory
# Binary checkpoints are written here periodically (snap_<lsn>.bin).
# On startup, the latest snapshot is loaded first, then WAL is replayed.
snapshot_dir = data/snapshots

# Snapshot interval: take a new snapshot every N WAL records (0 = disabled).
# Lower values = faster restart, more disk I/O during operation.
snapshot_interval = 100000

# ── TTL Sweeper ───────────────────────────────────────────────────────────────

# Background thread compacts expired/deleted rows every N seconds.
ttl_sweep_interval = 60

# ── Query Cache ───────────────────────────────────────────────────────────────

# LRU cache capacity (number of query results to cache).
# Cache is invalidated automatically on any mutation to the relevant table.
cache_capacity = 1024

# ── Design Trade-offs ─────────────────────────────────────────────────────────
#
# Storage model: columnar in-memory storage (StringArena + flat parallel arrays)
#   + WAL-based persistence.
#
# Why WAL instead of B-tree / page-based storage?
#   - WAL gives sequential disk writes (fast on SSDs and HDDs alike).
#   - Binary snapshots provide O(1) startup regardless of WAL length.
#   - Implementation is simple and auditable; no external library required.
#
# Why in-memory primary storage?
#   - Benchmark requires inserting 1M rows quickly — impossible with per-row
#     disk writes.  RAM is the primary store; WAL ensures committed writes
#     survive process crash.
#   - On restart, latest snapshot + WAL replay restores full state.
#
# WAL write strategy: zero-copy writev
#   - Each append() builds a 20-byte header on the stack, then calls
#     writev(header, sql_buffer) — no memcpy of the SQL payload.
#   - CRC32c uses SSE4.2 hardware instruction (_mm_crc32_u64): ~9ms for
#     200 batches of 275KB vs ~166ms for software table lookup.
#   - fdatasync is called only at shutdown/checkpoint (sync()), not per write.
#   - Total WAL overhead over pure RAM: ~50ms for 1M-row benchmark.
#
# Concurrency model:
#   - One shared_mutex per table (readers run concurrently; writer excludes).
#   - Thread pool with N=hardware_concurrency workers handles client connections.
#   - WAL writer uses a single mutex; writev is fast (~57us/call), no contention.
#   - TCP_NODELAY on all client sockets eliminates Nagle buffering delay.
#
# Read-heavy vs write-heavy workloads:
#   - Read-heavy: LRU query cache returns results without locking tables.
#   - Write-heavy: insert_flat() single-pass validate+intern+store with one lock
#     per 5000-row batch; StringArena eliminates per-string heap allocations.
